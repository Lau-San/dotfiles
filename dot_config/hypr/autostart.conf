# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = hyprctl setcursor Bibata-Modern-Classic 28

exec-once = hyprpm enable split-monitor-workspaces
exec-once = hypridle

# Set wallpaper
exec = swaybg -i $hypr/wallpaper.png

# Notification daemon
exec = killall notification-daemon; dunst

# Authentication agent
exec-once = /usr/lib/polkit-kde-authentication-agent-1

exec-once = sleep 5; eww daemon && sleep 1; eww open bar1 && eww open bar2
exec-once = sysmenu
# exec-once = walker --gapplication-service

exec-once = nm-applet
exec-once = flameshot

# exec-once = obsidian
exec-once = brave
exec-once = brave --app="http://notion.so" --class=Notion --name=Notion
