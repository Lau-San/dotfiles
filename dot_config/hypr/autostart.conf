# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec = hyprpm enable split-monitor-workspaces
exec = hyprpm reload

exec = hyprctl setcursor Bibata-Modern-Classic 28

exec-once = hypridle

# Set wallpaper
exec = swaybg -i $hypr/wallpaper.png

# Notification daemon
exec = killall notification-daemon; fnott

# Authentication agent
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Utilities
exec-once = sleep 2; eww daemon && sleep 1; eww open bar1 && eww open bar2
exec-once = walker --gapplication-service
exec-once = flameshot

exec-once = nm-applet

# exec-once = obsidian
exec-once = brave
exec-once = sleep 5; brave --app="http://notion.so"
exec-once = sleep 5; brave --app="http://calendar.notion.so"
