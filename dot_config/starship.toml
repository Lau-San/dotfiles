scan_timeout = 50
command_timeout = 1500
add_newline = true

format = """ $shell$directory($git_branch )\
$python\
$nodejs\
$lua
 $character
"""

[shell]
disabled = false
format = "[оВґ]($style)[$indicator ]($style inverted bg:green)"
style = "bright-black"
bash_indicator = "оѓК"
fish_indicator = "оєБ"

[character]
success_symbol = "[пБФ](green)"
error_symbol = "[пБФ](red)"
vicmd_symbol = "[пБФ](blue)"

[directory]
format = "[оВі](bg:$style bright-black)[ $path]($style inverted bg:blue)([ $read_only]($read_only_style bg:$style))[оВі]($style) "
style = "black"
read_only = "пА£ "
read_only_style = "red"
home_symbol = "пУҐ "
repo_root_style = "blue"
repo_root_format = "[оВі](bg:$repo_root_style bright-black)[ пРБ $repo_root]($repo_root_style inverted)[оВі](bg:$style $repo_root_style)[ $path]($style inverted bg:blue)([ $read_only]($read_only_style bg:$style))[оВі]($style) "
fish_style_pwd_dir_length = 2

[git_branch]
format = "[оВґ]($style)[$symbol$branch]($style inverted)[оВі]($style)"
style = "purple"
symbol = "оЬ• "

[git_commit]
format = " [оЬ©]($style bold) [$hash$tag]($style dimmed)"
style = "blue"
only_detached = false
tag_disabled = false

[git_status]
format = "[оВі](green bg:$style)[($all_status$ahead_behind) ]($style inverted)[оВі]($style)"
style = "black"
modified = " [пБА](bg:black fg:yellow)"
renamed = " [пБА](bg:black fg:blue)"
deleted = " [пАФ](bg:black fg:red)"
staged = " [пГЗ](bg:black fg:green)"
untracked = " [пД®](bg:black fg:purple)"

[python]
# format = "([пДД $symbol]($style bold) [$version]($style)( [рЯЮЪ](blue bold) [$virtualenv](blue))[ пДЕ]($style bold) )"
format = "([оВґ]($style)[$symbol $version( $virtualenv)]($style inverted)[оВі]($style) )"
style = "blue"
symbol = "оШЖ "
python_binary = ["python3", "python"]

[nodejs]
# format = "([пДД $symbol]($style bold) [$version]($style) [пДЕ]($style bold) )"
format = "([оВґ]($style)[$symbol $version]($style inverted)[оВі]($style) )"
style = "green"
symbol = "оЬШ "

[package]
format = "([пБУ $symbol]($style bold) [$version]($style) [пБФ]($style bold) )"
style = "yellow bold"
symbol = "ођ© "

[dotnet]
format = "([пДД $symbol]($style bold) [$version]($style) [пДЕ]($style bold) )"
style = "blue"
symbol = ".NET"
version_format ="v${major}.${minor}"

[lua]
#format = "([пДД $symbol]($style bold) [$version]($style) [пДЕ]($style bold) )"
format = "([оВґ]($style)[$symbol $version]($style inverted)[оВі]($style) )"
style = "blue"
symbol = "оШ†"

[cmd_duration]
disabled = true

[c]
format = "( [пДД $symbol]($style bold) [$version( - $name)]($style) [пДЕ]($style bold))"
symbol = "оШЮ"
style = "purple"

[cmake]
format = "( [пДД $symbol]($style bold) [$version]($style) [пДЕ]($style bold))"
style = "blue"


